name: Publish site

# Renders the Quarto site and deploys it to GitHub Pages on every push to main.
# Once Settings → Pages → Source is set to "GitHub Actions", adding a post file
# under posts/ (e.g. via the GitHub web/mobile editor) auto-publishes in ~2 min.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      # Version is pinned for reproducibility, not as a workaround.
      #
      # History (2026-07-16): before the home pages carried an explicit `title:` in
      # their front matter, Quarto 1.9+ promoted the hero's <h1 class="mk-name"> to be
      # the document title and moved it into #title-block-header — which the theme hides.
      # The result: the name silently vanished from all seven language home pages while
      # the build still reported success. This pin was the only thing preventing that.
      #
      # The homes now set `title:` explicitly (verified on 1.9.38: name stays in the
      # hero on all 7, <title>/og:title still come from `pagetitle`), so bumping this
      # version is safe. If you do bump it, re-run the check anyway:
      #   python "E:/Dropbox/1_Work/google sites/tools/audit_site.py"
      # and confirm the name renders on / and /ko/ — a green build does not prove it.
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.56"

      - name: Render site
        run: quarto render

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

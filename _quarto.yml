project:
  type: website
  output-dir: docs

website:
  title: "Minku Kang"
  description: "Minku Kang (강민구) — preventive medicine physician, social epidemiologist, and health-policy researcher."
  site-url: "https://kaangminku.github.io"
  favicon: images/profile.jpg
  reader-mode: false
  search: false
  navbar:
    pinned: true
    background: light
    right:
      - text: "Research"
        href: research.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "CV"
        href: cv.qmd
      - text: "Media"
        href: media.qmd
      - text: "한국어"
        menu:
          - text: "약력"
            href: korean.qmd
          - text: "인터뷰"
            href: interview.qmd
          - text: "취미생활"
